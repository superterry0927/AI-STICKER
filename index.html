<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法似顏繪貼圖生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定義進度條動畫 */
        .progress-bar {
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* 隱藏捲軸但保留捲動功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans selection:bg-purple-300 selection:text-purple-900">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        
        <!-- 標題區 -->
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-500 mb-2">
                ✨ 魔法似顏繪生成器
            </h1>
            <p class="text-gray-500 text-sm">上傳照片，唸出咒語，召喚專屬貼圖！</p>
        </header>

        <!-- 左右雙欄排版 (iPad橫式設計) -->
        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- 左欄：操作與設定區 -->
            <div class="w-full lg:w-5/12 space-y-6 flex flex-col">
                
                <!-- 內容輸入區 -->
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 space-y-6 flex-grow">
                    
                    <!-- 上傳照片 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">1. 獻上祭品 (上傳照片)</label>
                        <div id="dropZone" class="relative border-2 border-dashed border-gray-300 rounded-xl p-8 text-center hover:bg-gray-50 transition-colors cursor-pointer group">
                            <input type="file" id="imageInput" accept="image/png, image/jpeg, image/webp" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                            <div id="uploadPlaceholder" class="space-y-2">
                                <svg class="mx-auto h-12 w-12 text-gray-400 group-hover:text-purple-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                <p class="text-sm text-gray-500">點擊或拖曳圖片至此處</p>
                            </div>
                            <img id="imagePreview" class="hidden mx-auto max-h-48 rounded-lg object-contain" alt="預覽圖片">
                        </div>
                    </div>

                    <!-- 咒語輸入 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">2. 詠唱咒語 (貼圖風格或特徵)</label>
                        <textarea id="promptInput" rows="3" placeholder="例如：請畫成日系動漫風格，頭上帶著可愛的貓耳，表情要很開心..." 
                                  class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition-all resize-none"></textarea>
                    </div>

                    <!-- 系統提示訊息 -->
                    <div id="systemMessage" class="hidden rounded-xl p-4 text-sm"></div>

                    <!-- 生成按鈕 -->
                    <button id="generateBtn" class="w-full py-4 bg-gradient-to-r from-purple-600 to-pink-500 hover:from-purple-700 hover:to-pink-600 text-white rounded-xl font-bold text-lg shadow-md transform transition-all active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none flex justify-center items-center">
                        <span id="btnText">✨ 立即生成貼圖</span>
                        <span id="cooldownText" class="hidden ml-2 text-purple-200 text-sm font-normal"></span>
                        <svg id="loadingIcon" class="animate-spin ml-2 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    </button>
                </div>
            </div>

            <!-- 右欄：結果展示區 -->
            <div class="w-full lg:w-7/12 flex flex-col">
                <div id="resultSection" class="hidden bg-white rounded-2xl shadow-sm border border-gray-100 p-6 animate-fade-in-up flex-grow flex flex-col h-full">
                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                        <svg class="w-5 h-5 mr-2 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                        魔法完成！您的專屬貼圖
                    </h2>
                    
                    <div class="flex flex-col gap-8 flex-grow justify-center">
                        <!-- 生成的圖片 -->
                        <div class="w-full flex items-center justify-center bg-gray-50 rounded-xl p-4 border border-gray-100 relative min-h-[300px]">
                            <img id="resultImage" class="max-w-full max-h-[450px] object-contain rounded-lg shadow-sm" alt="生成的貼圖">
                            <!-- 下載按鈕疊加 -->
                            <button id="downloadBtn" class="absolute bottom-4 right-4 bg-white/90 backdrop-blur-sm hover:bg-white text-gray-800 p-3 rounded-full shadow-lg transition-all" title="下載貼圖">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            </button>
                        </div>

                        <!-- 情緒價值血條區 -->
                        <div class="w-full space-y-6">
                            <!-- 血條 1：相似度 -->
                            <div>
                                <div class="flex justify-between items-end mb-1">
                                    <span class="text-sm font-semibold text-gray-700 flex items-center">
                                        <svg class="w-4 h-4 mr-1 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                        與原照片相似度
                                    </span>
                                    <span id="similarityText" class="text-sm font-bold text-blue-600">0%</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden shadow-inner">
                                    <div id="similarityBar" class="bg-gradient-to-r from-blue-400 to-blue-600 h-4 rounded-full progress-bar w-0 relative">
                                        <div class="absolute inset-0 w-full h-full" style="background-image: linear-gradient(45deg,rgba(255,255,255,.15) 25%,transparent 25%,transparent 50%,rgba(255,255,255,.15) 50%,rgba(255,255,255,.15) 75%,transparent 75%,transparent); background-size: 1rem 1rem;"></div>
                                    </div>
                                </div>
                                <p class="text-xs text-gray-500 mt-1">捕捉到了靈魂神韻！</p>
                            </div>

                            <!-- 血條 2：創意與美感 -->
                            <div>
                                <div class="flex justify-between items-end mb-1">
                                    <span class="text-sm font-semibold text-gray-700 flex items-center">
                                        <svg class="w-4 h-4 mr-1 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                                        創意與美感
                                    </span>
                                    <span id="creativityText" class="text-sm font-bold text-pink-600">0%</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden shadow-inner">
                                    <div id="creativityBar" class="bg-gradient-to-r from-pink-400 to-purple-500 h-4 rounded-full progress-bar w-0 relative">
                                        <div class="absolute inset-0 w-full h-full" style="background-image: linear-gradient(45deg,rgba(255,255,255,.15) 25%,transparent 25%,transparent 50%,rgba(255,255,255,.15) 50%,rgba(255,255,255,.15) 75%,transparent 75%,transparent); background-size: 1rem 1rem;"></div>
                                    </div>
                                </div>
                                <p class="text-xs text-gray-500 mt-1">這簡直是藝術品等級的創作！</p>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM 元素
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const promptInput = document.getElementById('promptInput');
        const generateBtn = document.getElementById('generateBtn');
        const btnText = document.getElementById('btnText');
        const cooldownText = document.getElementById('cooldownText');
        const loadingIcon = document.getElementById('loadingIcon');
        const systemMessage = document.getElementById('systemMessage');
        const resultSection = document.getElementById('resultSection');
        const resultImage = document.getElementById('resultImage');
        const downloadBtn = document.getElementById('downloadBtn');
        
        const similarityBar = document.getElementById('similarityBar');
        const similarityText = document.getElementById('similarityText');
        const creativityBar = document.getElementById('creativityBar');
        const creativityText = document.getElementById('creativityText');

        // 狀態變數
        let base64Image = null;
        let imageMimeType = null;
        const COOLDOWN_TIME = 60; // 60秒冷卻
        const COOLDOWN_KEY = 'caricature_cooldown_timestamp';

        // 2. 處理圖片上傳預覽
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 檢查檔案類型
            if (!['image/jpeg', 'image/png', 'image/webp'].includes(file.type)) {
                showMessage('請上傳 JPG, PNG 或 WEBP 格式的照片。', 'error');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                // 設定預覽
                imagePreview.src = event.target.result;
                imagePreview.classList.remove('hidden');
                uploadPlaceholder.classList.add('hidden');
                
                // 儲存 base64 資料 (移除 data:image/png;base64, 前綴)
                const base64String = event.target.result.split(',')[1];
                base64Image = base64String;
                imageMimeType = file.type;
            };
            reader.readAsDataURL(file);
        });

        // 3. 冷卻時間機制
        function updateCooldownState() {
            const lastGenTime = localStorage.getItem(COOLDOWN_KEY);
            if (!lastGenTime) return;

            const now = Date.now();
            const elapsedSeconds = Math.floor((now - parseInt(lastGenTime)) / 1000);
            
            if (elapsedSeconds < COOLDOWN_TIME) {
                const remaining = COOLDOWN_TIME - elapsedSeconds;
                setButtonState('cooldown', remaining);
                
                // 每秒更新倒數
                setTimeout(updateCooldownState, 1000);
            } else {
                setButtonState('ready');
                localStorage.removeItem(COOLDOWN_KEY);
            }
        }

        // 開始冷卻
        function startCooldown() {
            localStorage.setItem(COOLDOWN_KEY, Date.now().toString());
            updateCooldownState();
        }

        // 4. 管理按鈕與 UI 狀態
        function setButtonState(state, remainingSeconds = 0) {
            switch(state) {
                case 'loading':
                    generateBtn.disabled = true;
                    btnText.textContent = '魔法詠唱中...';
                    loadingIcon.classList.remove('hidden');
                    cooldownText.classList.add('hidden');
                    break;
                case 'cooldown':
                    generateBtn.disabled = true;
                    btnText.textContent = '魔力恢復中';
                    cooldownText.textContent = `(${remainingSeconds}s)`;
                    cooldownText.classList.remove('hidden');
                    loadingIcon.classList.add('hidden');
                    break;
                case 'ready':
                default:
                    generateBtn.disabled = false;
                    btnText.textContent = '✨ 立即生成貼圖';
                    cooldownText.classList.add('hidden');
                    loadingIcon.classList.add('hidden');
                    break;
            }
        }

        function showMessage(msg, type = 'info') {
            systemMessage.textContent = msg;
            systemMessage.className = `p-4 rounded-xl text-sm mb-6 ${
                type === 'error' ? 'bg-red-50 text-red-600 border border-red-100' : 
                'bg-blue-50 text-blue-600 border border-blue-100'
            }`;
            systemMessage.classList.remove('hidden');
            
            // 5秒後隱藏
            setTimeout(() => {
                systemMessage.classList.add('hidden');
            }, 5000);
        }

        // 5. 處理血條動畫 (給予情緒價值)
        function animateProgressBars() {
            // 隨機產生高分的數值，給予使用者良好的情緒價值
            // 相似度: 75% ~ 95%
            const similarityScore = Math.floor(Math.random() * (95 - 75 + 1)) + 75;
            // 創意與美感: 85% ~ 99%
            const creativityScore = Math.floor(Math.random() * (99 - 85 + 1)) + 85;

            // 重置進度條
            similarityBar.style.width = '0%';
            creativityBar.style.width = '0%';
            similarityText.textContent = '0%';
            creativityText.textContent = '0%';

            // 觸發重繪
            void similarityBar.offsetWidth;

            // 動畫執行
            setTimeout(() => {
                similarityBar.style.width = `${similarityScore}%`;
                creativityBar.style.width = `${creativityScore}%`;
                
                // 數字計數器動畫
                animateValue(similarityText, 0, similarityScore, 1500);
                animateValue(creativityText, 0, creativityScore, 1500);
            }, 100);
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                // 使用 ease-out 公式讓數字慢下來
                const easeOutProgress = 1 - Math.pow(1 - progress, 3);
                obj.innerHTML = Math.floor(easeOutProgress * (end - start) + start) + '%';
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        // 6. 下載圖片功能
        downloadBtn.addEventListener('click', () => {
            if (!resultImage.src) return;
            const link = document.createElement('a');
            link.href = resultImage.src;
            link.download = `魔法貼圖_${new Date().getTime()}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // 7. 核心 API 呼叫流程
        generateBtn.addEventListener('click', async () => {
            const userPrompt = promptInput.value.trim();

            if (!base64Image) return showMessage('請先上傳一張做為祭品的照片！', 'error');
            
            // 將金鑰分為兩段，防止被簡單的爬蟲直接抓取
            const KEY_P1 = "AIzaSyA6QH-jWS-";
            const KEY_P2 = "5TlyODnhZm-8O9lSobRzG7og";
            const apiKey = KEY_P1 + KEY_P2;

            // 重置 UI 與進入 Loading
            systemMessage.classList.add('hidden');
            resultSection.classList.add('hidden');
            setButtonState('loading');
            
            // 不論成功或失敗，按下按鈕就觸發 60 秒冷卻
            startCooldown();

            try {
                // ==========================================
                // 第一階段：使用公開的模型解析照片 (加入自動備援切換機制)
                // ==========================================
                btnText.textContent = '🔍 正在解析照片特徵...';
                
                const visionPayload = {
                    contents: [{
                        parts: [
                            { text: "請簡短描述這張照片中人物的長相特徵（包含性別、髮型、髮色、是否戴眼鏡等），大約 30 字以內。" },
                            { inlineData: { mimeType: imageMimeType, data: base64Image } }
                        ]
                    }]
                };

                // 定義多個備用模型，避免單一模型名稱因金鑰權限找不到而報錯
                const modelsToTry = ['gemini-1.5-flash-latest', 'gemini-1.5-flash-8b-latest', 'gemini-2.0-flash', 'gemini-1.5-pro-latest'];
                let visionResult = null;
                let faceDescription = '';

                // 自動輪詢測試模型，直到有一個成功為止
                for (const modelName of modelsToTry) {
                    try {
                        const visionResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(visionPayload),
                            referrerPolicy: "no-referrer"
                        });

                        if (visionResponse.ok) {
                            visionResult = await visionResponse.json();
                            faceDescription = visionResult.candidates?.[0]?.content?.parts?.[0]?.text || '可愛的人物';
                            console.log(`✅ 成功調用模型：${modelName}`);
                            break; // 成功獲取結果就跳出迴圈
                        } else {
                            const err = await visionResponse.json();
                            console.warn(`❌ 模型 ${modelName} 失敗：`, err.error?.message);
                        }
                    } catch (e) {
                        console.warn(`請求 ${modelName} 時發生網路異常`);
                    }
                }

                if (!visionResult) {
                    throw new Error(`[第一階段錯誤] 您的金鑰權限無法存取任何基礎視覺模型。建議至 Google AI Studio 點擊「Create API key」重新產生一組全新的金鑰。`);
                }

                // ==========================================
                // 第二階段：使用公開的 imagen-3.0-generate-001 繪圖
                // ==========================================
                btnText.textContent = '🎨 正在繪製專屬貼圖...';
                
                // 將特徵與咒語組合 (Imagen 3 對英文理解較好，我們在系統層面加上英文的貼圖風格限制)
                const combinedPrompt = `A high quality illustration sticker, pure white background. Character physical features based on this description: ${faceDescription}. Additional user requests: ${userPrompt || 'cute anime style, highly detailed, vivid colors'}.`;

                const generatePayload = {
                    instances: [
                        { prompt: combinedPrompt }
                    ],
                    parameters: {
                        sampleCount: 1,
                        aspectRatio: "1:1"
                    }
                };

                const generateResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-3.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(generatePayload),
                    referrerPolicy: "no-referrer" // 嘗試繞過部分前端限制
                });

                if (!generateResponse.ok) {
                    // 強化錯誤捕捉
                    const err = await generateResponse.json();
                    const realErrorMsg = err.error?.message || generateResponse.statusText;
                    throw new Error(`[第二階段錯誤] ${realErrorMsg}`);
                }

                const generateResult = await generateResponse.json();
                
                // 解析 Imagen 3 回傳的 Base64 格式
                if (generateResult.predictions && generateResult.predictions[0]?.bytesBase64Encoded) {
                    // 顯示圖片與結果區塊
                    const returnedBase64 = generateResult.predictions[0].bytesBase64Encoded;
                    resultImage.src = `data:image/png;base64,${returnedBase64}`;
                    
                    resultSection.classList.remove('hidden');
                    // 捲動到結果區
                    resultSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    
                    // 播放情緒價值血條動畫
                    animateProgressBars();
                } else {
                    throw new Error('模型未回傳圖片資料，請稍後再試。');
                }

            } catch (error) {
                console.error("Generation Error:", error);
                // 把錯誤訊息完整顯示出來
                showMessage(`魔法施展失敗：${error.message}`, 'error');
            } finally {
                // 如果目前按鈕還是 loading 狀態（代表出錯了，沒有被倒數計時取代），則恢復狀態
                if (btnText.textContent.includes('正在')) {
                    // 若還在冷卻中，會由 updateCooldownState 接管
                    const lastGenTime = localStorage.getItem(COOLDOWN_KEY);
                    const elapsedSeconds = Math.floor((Date.now() - parseInt(lastGenTime)) / 1000);
                    if (elapsedSeconds >= COOLDOWN_TIME) {
                        setButtonState('ready');
                    }
                }
            }
        });

        // 頁面載入時檢查冷卻狀態
        updateCooldownState();
    </script>
</body>
</html>
